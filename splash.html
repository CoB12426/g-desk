<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(900px 500px at 20% 10%, rgba(26, 115, 232, 0.18) 0%, transparent 55%),
                  radial-gradient(800px 420px at 80% 20%, rgba(99, 102, 241, 0.16) 0%, transparent 60%),
                  #0b0f19;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: rgba(255, 255, 255, 0.88);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    #boot-img {
      width: 160px;
      height: 160px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
      border-radius: 32px;
      background: rgba(17, 24, 39, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: popIn 420ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    img {
      width: 128px;
      height: 128px;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.35));
      position: relative;
      z-index: 1;
    }

    #boot-img::after {
      content: "";
      position: absolute;
      inset: -60px;
      background: conic-gradient(from 90deg, rgba(26,115,232,0.0), rgba(26,115,232,0.45), rgba(99,102,241,0.0));
      animation: spin 1.4s linear infinite;
      opacity: 0.28;
      z-index: 0;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes popIn {
      from { transform: translateY(10px) scale(0.96); opacity: 0; }
      to { transform: translateY(0px) scale(1); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot-img, #boot-img::after { animation: none !important; }
    }
  </style>
</head>
<body>
  <div id="boot-img">
    <img src="./boot.png" alt="Loading">
  </div>
</body>
</html>
